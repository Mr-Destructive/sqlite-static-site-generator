name: Sync Posts

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scripts/sync/go.sum
      - name: Sync from Turso
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_POSTS_QUERY: ${{ secrets.TURSO_POSTS_QUERY || 'SELECT slug, title, content, excerpt, tags, metadata, type_id, created_at, updated_at, published_at, status FROM posts WHERE status=''published''' }}
        run: |
          cd scripts/sync
          go run . --since-hours 24
      - name: Commit changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: sync posts"
            git push
          fi
