name: Sync Posts

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scripts/sync/go.sum
      - name: Sync from RSS
        env:
          SITE_RSS_URL: ${{ secrets.SITE_RSS_URL || 'https://www.meetgor.com/rss.xml' }}
        run: |
          cd scripts/sync
          go run . --rss-url "$SITE_RSS_URL"
      - name: Commit changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: sync posts"
            git push
          fi
