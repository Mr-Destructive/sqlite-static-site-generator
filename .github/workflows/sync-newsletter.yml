name: Sync Newsletter

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scripts/sync/go.sum
      - name: Sync from Turso + RSS
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_POSTS_QUERY: ${{ secrets.TURSO_POSTS_QUERY || 'SELECT slug, title, content, excerpt, tags, metadata, type_id, created_at, updated_at, published_at, status FROM posts WHERE status=''published''' }}
          NEWSLETTER_RSS_URL: ${{ secrets.NEWSLETTER_RSS_URL || 'https://www.meetgor.com/type/newsletter/rss.xml' }}
        run: |
          cd scripts/sync
          go run . --since-hours 168 --newsletter
      - name: Commit changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "chore: sync newsletter"
            git push
          fi
